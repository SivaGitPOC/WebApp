name: Deploy Flask App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Windows Server
    runs-on: self-hosted

    env:
      APP_DIR: D:\CICD-POC

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug Runner Environment
        shell: powershell
        run: |
          Write-Host "===== USER ====="
          whoami

          Write-Host ""
          Write-Host "===== USER PROFILE ====="
          Write-Host $env:USERPROFILE

          Write-Host ""
          Write-Host "===== PATH ====="
          Write-Host $env:PATH

          Write-Host ""
          Write-Host "===== PYTHON ====="
          where.exe python

          Write-Host ""
          Write-Host "===== PYTHON VERSION ====="
          python --version

          Write-Host ""
          Write-Host "===== PIP VERSION ====="
          python -m pip --version

      - name: Copy Application Files
        shell: powershell
        run: |
          if (!(Test-Path "${env:APP_DIR}")) {
              New-Item -ItemType Directory -Path "${env:APP_DIR}" | Out-Null
          }

          Copy-Item `
            "${{ github.workspace }}\*" `
            "${env:APP_DIR}" `
            -Recurse `
            -Force

      - name: Install Dependencies
        shell: powershell
        run: |
          Set-Location "${env:APP_DIR}"

          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Stop Existing Waitress
        shell: powershell
        continue-on-error: true
        run: |
          Get-CimInstance Win32_Process |
          Where-Object {
              $_.CommandLine -like "*waitress*"
          } |
          ForEach-Object {
              Stop-Process -Id $_.ProcessId -Force
          }

      - name: Start Waitress
        shell: powershell
        run: |
          Set-Location "${env:APP_DIR}"

          Start-Process `
            -FilePath "python" `
            -ArgumentList "-m waitress --host=0.0.0.0 --port=5000 app:app" `
            -WorkingDirectory "${env:APP_DIR}" `
            -WindowStyle Hidden

      - name: Wait for Startup
        shell: powershell
        run: |
          Start-Sleep -Seconds 10

      - name: Verify Deployment
        shell: powershell
        run: |
          $response = Invoke-WebRequest `
            -Uri "http://localhost:5000" `
            -UseBasicParsing

          if ($response.StatusCode -eq 200) {
              Write-Host "Deployment Successful!"
          }
          else {
              throw "Deployment verification failed."
          }
