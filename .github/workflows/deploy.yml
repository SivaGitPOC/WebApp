name: Deploy Flask App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    env:
      APP_DIR: D:\CICD-POC

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Find Python
        shell: powershell
        run: |
          $python = Get-ChildItem "C:\Users\*\AppData\Local\Programs\Python\*\python.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if ($null -eq $python) {
            throw "Python not found."
          }

          "PYTHON_EXE=$($python.FullName)" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append

          & $python.FullName --version

      - name: Create Deployment Folder
        shell: powershell
        run: |
          if (!(Test-Path $env:APP_DIR)) {
            New-Item -ItemType Directory -Path $env:APP_DIR | Out-Null
          }

      - name: Copy Application Files
        shell: powershell
        run: |
          robocopy `
            "$env:GITHUB_WORKSPACE" `
            "$env:APP_DIR" `
            /E `
            /R:2 `
            /W:2 `
            /NFL `
            /NDL `
            /NJH `
            /NJS `
            /NP `
            /XD ".git" ".github" "__pycache__" "venv"

          $rc = $LASTEXITCODE

          Write-Host "Robocopy Exit Code: $rc"

          if ($rc -ge 8) {
              throw "Robocopy failed with exit code $rc"
          }

          # Prevent GitHub Actions from failing on Robocopy success codes
          $global:LASTEXITCODE = 0
          exit 0

      - name: Install Dependencies
        shell: powershell
        run: |
          Set-Location "$env:APP_DIR"

          & "$env:PYTHON_EXE" -m pip install --upgrade pip
          & "$env:PYTHON_EXE" -m pip install -r requirements.txt

      - name: Restart NSSM Service
        shell: powershell
        run: |
          Restart-Service WebApp -Force

          Start-Sleep -Seconds 5

          Get-Service WebApp

      - name: Wait for Application
        shell: powershell
        run: |
          $success = $false

          foreach ($i in 1..15) {

            try {

              $response = Invoke-WebRequest `
                -Uri "http://localhost:5000" `
                -UseBasicParsing `
                -TimeoutSec 5

              if ($response.StatusCode -eq 200) {

                Write-Host "Application is healthy."
                $success = $true
                break
              }

            }
            catch {

              Write-Host "Waiting... Attempt $i"
              Start-Sleep -Seconds 2

            }

          }

          if (-not $success) {

            Write-Host ""
            Write-Host "===== SERVICE ====="
            Get-Service WebApp

            Write-Host ""
            Write-Host "===== PORT ====="
            netstat -ano | findstr :5000

            Write-Host ""
            Write-Host "===== STDERR ====="
            if (Test-Path "$env:APP_DIR\stderr.log") {
              Get-Content "$env:APP_DIR\stderr.log" -Tail 100
            }

            Write-Host ""
            Write-Host "===== STDOUT ====="
            if (Test-Path "$env:APP_DIR\stdout.log") {
              Get-Content "$env:APP_DIR\stdout.log" -Tail 100
            }

            throw "Application failed health check."
          }

      - name: Deployment Complete
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "========================================"
          Write-Host "Deployment completed successfully!"
          Write-Host "URL: http://localhost:5000"
          Write-Host "========================================"
