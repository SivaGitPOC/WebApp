name: Deploy Flask App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Windows Server
    runs-on: self-hosted

    env:
      APP_DIR: D:\CICD-POC

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug Runner Environment
        shell: powershell
        run: |
          Write-Host "===== USER ====="
          whoami

          Write-Host ""
          Write-Host "===== COMPUTER ====="
          hostname

          Write-Host ""
          Write-Host "===== USER PROFILE ====="
          Write-Host $env:USERPROFILE

          Write-Host ""
          Write-Host "===== PATH ====="
          Write-Host $env:PATH

      - name: Locate Python
        id: python
        shell: powershell
        run: |
          $python = Get-ChildItem `
              "C:\Users\*\AppData\Local\Programs\Python\*\python.exe" `
              -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1

          if (-not $python) {
              throw "Python executable not found."
          }

          Write-Host "Python found at: $($python.FullName)"

          "PYTHON_EXE=$($python.FullName)" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append

      - name: Verify Python
        shell: powershell
        run: |
          & "$env:PYTHON_EXE" --version
          & "$env:PYTHON_EXE" -m pip --version

      - name: Create Deployment Folder
        shell: powershell
        run: |
          if (!(Test-Path "$env:APP_DIR")) {
            New-Item -ItemType Directory -Path "$env:APP_DIR" | Out-Null
          }

      - name: Copy Files
        shell: powershell
        run: |
          Copy-Item `
            "$env:GITHUB_WORKSPACE\*" `
            "$env:APP_DIR" `
            -Recurse `
            -Force

      - name: Install Dependencies
        shell: powershell
        run: |
          Set-Location "$env:APP_DIR"

          & "$env:PYTHON_EXE" -m pip install --upgrade pip
          & "$env:PYTHON_EXE" -m pip install -r requirements.txt

      - name: Stop Existing Waitress
        shell: powershell
        continue-on-error: true
        run: |
          Get-CimInstance Win32_Process |
          Where-Object {
            $_.CommandLine -match "waitress"
          } |
          ForEach-Object {
            Stop-Process -Id $_.ProcessId -Force
          }

      - name: Start Application
        shell: powershell
        run: |
          Set-Location "$env:APP_DIR"

          Start-Process `
            -FilePath "$env:PYTHON_EXE" `
            -ArgumentList "-m waitress --host=0.0.0.0 --port=5000 app:app" `
            -WorkingDirectory "$env:APP_DIR"

      - name: Wait for Startup
        shell: powershell
        run: |
          Start-Sleep -Seconds 10

      - name: Verify Deployment
        shell: powershell
        run: |
          $response = Invoke-WebRequest `
            -Uri "http://localhost:5000" `
            -UseBasicParsing

          if ($response.StatusCode -eq 200) {
            Write-Host "Deployment Successful!"
          }
          else {
            throw "Deployment verification failed."
          }
