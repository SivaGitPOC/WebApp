name: Deploy Flask App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    env:
      APP_DIR: D:\CICD-POC

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Locate Python
        shell: powershell
        run: |
          $python = Get-ChildItem "C:\Users\*\AppData\Local\Programs\Python\*\python.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if ($null -eq $python) {
            throw "Python executable not found."
          }

          Write-Host "Python found: $($python.FullName)"

          "PYTHON_EXE=$($python.FullName)" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append

      - name: Verify Python
        shell: powershell
        run: |
          & "$env:PYTHON_EXE" --version
          & "$env:PYTHON_EXE" -m pip --version

      - name: Create Deployment Folder
        shell: powershell
        run: |
          if (!(Test-Path "$env:APP_DIR")) {
            New-Item -ItemType Directory -Path "$env:APP_DIR" | Out-Null
          }

      - name: Copy Application Files
        shell: powershell
        run: |
          robocopy "$env:GITHUB_WORKSPACE" "$env:APP_DIR" /MIR /XD ".git" ".github" "__pycache__"
          if ($LASTEXITCODE -gt 7) {
            throw "Robocopy failed with exit code $LASTEXITCODE"
          }

      - name: Install Dependencies
        shell: powershell
        run: |
          Set-Location "$env:APP_DIR"

          & "$env:PYTHON_EXE" -m pip install --upgrade pip
          & "$env:PYTHON_EXE" -m pip install -r requirements.txt

      - name: Restart WebApp Service
        shell: powershell
        run: |
          Restart-Service WebApp -Force

          Write-Host "Waiting for service to start..."
          Start-Sleep -Seconds 5

          Get-Service WebApp

      - name: Health Check
        shell: powershell
        run: |
          $success = $false

          foreach ($i in 1..10) {
              try {
                  $response = Invoke-WebRequest "http://localhost:5000" -UseBasicParsing

                  if ($response.StatusCode -eq 200) {
                      Write-Host "Deployment Successful!"
                      $success = $true
                      break
                  }
              }
              catch {
                  Write-Host "Attempt $i of 10 - Application not ready..."
                  Start-Sleep -Seconds 3
              }
          }

          if (-not $success) {
              Write-Host "===== WebApp Service ====="
              Get-Service WebApp

              Write-Host "===== Last 50 lines of stderr.log ====="
              if (Test-Path "$env:APP_DIR\stderr.log") {
                  Get-Content "$env:APP_DIR\stderr.log" -Tail 50
              }

              throw "Application failed health check."
          }
