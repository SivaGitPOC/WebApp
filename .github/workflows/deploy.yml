steps:
  - uses: actions/checkout@v4

  - name: Verify Python
    shell: powershell
    run: |
      python --version
      pip --version

  - name: Copy Files
    shell: powershell
    run: |
      Copy-Item "${{ github.workspace }}\*" "D:\CICD-POC" -Recurse -Force

  - name: Install Requirements
    shell: powershell
    run: |
      cd D:\CICD-POC
      pip install -r requirements.txt
